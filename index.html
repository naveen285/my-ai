<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My AI Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-box {
            width: 500px;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }
        #messages {
            height: 300px;
            overflow-y: auto;
            background: #020617;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .user { color: #38bdf8; }
        .ai { color: #4ade80; }
        input {
            width: 75%;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }
        button {
            padding: 10px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="chat-box">
    <h2>🤖 Naveen  Assistant</h2>
    <div id="messages"></div>

    <input type="text" id="userInput" placeholder="Message likho...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    const messagesDiv = document.getElementById("messages");

    // Show user message
    messagesDiv.innerHTML += `<div class="user">You: ${message}</div>`;

    input.value = "";

    try {
        const res = await fetch("/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: message })
        });

        const data = await res.json();

        messagesDiv.innerHTML += `<div class="ai">AI: ${data.reply}</div>`;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

    } catch (err) {
        messagesDiv.innerHTML += `<div class="ai">Error connecting to server</div>`;
    }
}
</script>

</body>
</html>
