<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Naveen AI Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.chat-box{
width:100%;
max-width:600px;
background:#1e293b;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

#messages{
height:350px;
overflow-y:auto;
background:#020617;
padding:10px;
border-radius:6px;
margin-bottom:10px;
}

.user{
color:#38bdf8;
margin-bottom:8px;
}

.ai{
color:#4ade80;
margin-bottom:8px;
}

</style>

</head>

<body>

<div class="chat-box">

<h3 class="text-center mb-3">🤖 Naveen AI Assistant</h3>

<div id="messages"></div>

<div class="input-group">

<input
type="text"
id="userInput"
class="form-control"
placeholder="Message likho..."
onkeypress="handleKey(event)"
>

<button class="btn btn-primary" onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

function handleKey(event){
if(event.key === "Enter"){
sendMessage();
}
}

async function sendMessage(){

const input=document.getElementById("userInput");
const message=input.value.trim();

if(!message) return;

const messagesDiv=document.getElementById("messages");

messagesDiv.innerHTML+=`<div class="user"><b>You:</b> ${message}</div>`;

messagesDiv.scrollTop=messagesDiv.scrollHeight;

input.value="";

try{

const res=await fetch("/ask",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
});

const data=await res.json();

messagesDiv.innerHTML+=`<div class="ai"><b>AI:</b> ${data.reply}</div>`;

messagesDiv.scrollTop=messagesDiv.scrollHeight;

}catch(err){

messagesDiv.innerHTML+=`<div class="ai">Server error</div>`;

}

}

</script>

</body>
</html>
