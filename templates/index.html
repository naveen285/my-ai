<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Naveen AI Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.chat-box{
width:100%;
max-width:650px;
background:#1e293b;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:#020617;
padding:12px;
text-align:center;
font-weight:bold;
font-size:20px;
}

#messages{
height:400px;
overflow-y:auto;
padding:15px;
background:#0f172a;
}

.message{
margin-bottom:10px;
max-width:75%;
padding:10px 14px;
border-radius:12px;
font-size:15px;
}

.user{
background:#2563eb;
margin-left:auto;
text-align:right;
}

.ai{
background:#334155;
}

.input-area{
padding:10px;
background:#020617;
}

.form-control{
background:#0f172a;
color:white;
border:none;
}

.form-control:focus{
background:#0f172a;
color:white;
box-shadow:none;
}

.btn-send{
background:#22c55e;
border:none;
}

.btn-send:hover{
background:#16a34a;
}

</style>

</head>

<body>

<div class="chat-box">

<div class="header">
🤖 Naveen AI Assistant
</div>

<div id="messages"></div>

<div class="input-area">
<div class="input-group">

<input
type="text"
id="userInput"
class="form-control"
placeholder="Type message..."
onkeypress="handleKey(event)"
>

<button class="btn btn-send" onclick="sendMessage()">
Send
</button>

</div>
</div>

</div>

<script>

function handleKey(event){
if(event.key === "Enter"){
sendMessage();
}
}

async function sendMessage(){

const input=document.getElementById("userInput");
const message=input.value.trim();

if(!message) return;

const messages=document.getElementById("messages");

messages.innerHTML+=`<div class="message user">${message}</div>`;
messages.scrollTop=messages.scrollHeight;

input.value="";

try{

const res=await fetch("/ask",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
});

const data=await res.json();

typeAIMessage(data.reply);

}catch{

messages.innerHTML+=`<div class="message ai">⚠ Server Error</div>`;

}

}

function typeAIMessage(text){

const messages=document.getElementById("messages");

const msgDiv=document.createElement("div");
msgDiv.className="message ai";

messages.appendChild(msgDiv);

let i=0;

function typing(){

if(i<text.length){
msgDiv.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,20);
}

messages.scrollTop=messages.scrollHeight;

}

typing();

}

</script>

</body>
</html>
