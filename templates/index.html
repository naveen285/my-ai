<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Naveen AI Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#0f172a,#020617,#1e293b);
color:white;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

/* Chat Box */

.chat-box{
width:100%;
max-width:650px;
background:linear-gradient(180deg,#1e293b,#020617);
border-radius:15px;
box-shadow:0 0 25px rgba(0,0,0,0.7);
display:flex;
flex-direction:column;
overflow:hidden;
}

/* Header */

.header{
background:linear-gradient(90deg,#2563eb,#22c55e);
padding:12px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-weight:bold;
font-size:20px;
}

/* Profile Photo */

.profile{
width:40px;
height:40px;
border-radius:50%;
border:2px solid white;
}

/* Message Area */

#messages{
height:400px;
overflow-y:auto;
padding:15px;
background:#0f172a;
}

/* Message Bubble */

.message{
margin-bottom:12px;
max-width:75%;
padding:10px 15px;
border-radius:14px;
font-size:15px;
animation:fade 0.3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

/* User Message */

.user{
background:linear-gradient(45deg,#3b82f6,#6366f1);
margin-left:auto;
text-align:right;
}

/* AI Message */

.ai{
background:linear-gradient(45deg,#334155,#1e293b);
border:1px solid #475569;
}

/* Input Area */

.input-area{
padding:12px;
background:#020617;
border-top:1px solid #334155;
}

.form-control{
background:#0f172a;
color:white;
border:1px solid #334155;
border-radius:8px;
}

.form-control:focus{
background:#0f172a;
color:white;
border:1px solid #38bdf8;
box-shadow:0 0 5px #38bdf8;
}

/* Send Button */

.btn-send{
background:linear-gradient(45deg,#22c55e,#4ade80);
border:none;
border-radius:8px;
font-weight:bold;
transition:0.3s;
}

.btn-send:hover{
transform:scale(1.05);
}

/* Scrollbar */

#messages::-webkit-scrollbar{
width:6px;
}

#messages::-webkit-scrollbar-thumb{
background:#475569;
border-radius:10px;
}

</style>

</head>

<body>

<div class="chat-box">

<div class="header">



<span>🤖 Naveen AI Assistant</span>

</div>

<div id="messages"></div>

<div class="input-area">
<div class="input-group">

<input
type="text"
id="userInput"
class="form-control"
placeholder="Type message..."
onkeypress="handleKey(event)"
>

<button class="btn btn-send" onclick="sendMessage()">
Send
</button>

</div>
</div>

</div>

<script>

function handleKey(event){
if(event.key === "Enter"){
sendMessage();
}
}

async function sendMessage(){

const input=document.getElementById("userInput");
const message=input.value.trim();

if(!message) return;

const messages=document.getElementById("messages");

messages.innerHTML+=`<div class="message user">${message}</div>`;
messages.scrollTop=messages.scrollHeight;

input.value="";

try{

const res=await fetch("/ask",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
});

const data=await res.json();

typeAIMessage(data.reply);

}catch{

messages.innerHTML+=`<div class="message ai">⚠ Server Error</div>`;

}

}

function typeAIMessage(text){

const messages=document.getElementById("messages");

const msgDiv=document.createElement("div");
msgDiv.className="message ai";

messages.appendChild(msgDiv);

let i=0;

function typing(){

if(i<text.length){
msgDiv.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,20);
}

messages.scrollTop=messages.scrollHeight;

}

typing();

}

</script>

</body>
</html>
